<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For My Muskan 💖</title>
  <link rel="stylesheet" href="style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">
</head>

<body>

<!-- Background Music -->
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Overlay -->
<div class="overlay"></div>

<!-- Main Card -->
<div class="card">

  <h1>For My Muskan 💖</h1>
  <h2 class="subtitle">My Golu 💫</h2>

  <!-- Photo -->
  <img src="img1.jpg" class="photo">

  <!-- Message -->
  <p id="message"></p>

  <!-- Buttons -->
  <div class="buttons">
    <button onclick="showMessage()">💌 Read My Heart</button>
    <button onclick="openVideo()">🎁 Surprise</button>
  </div>

</div>

<!-- Extra Message -->
<div id="extra" class="hidden extra">
  <p>
    My Golu...  
    If love had a place, it would be right next to you.  
    If happiness had a name, it would be Muskan.  
    And if my heart had a home… it would always be you ❤️
  </p>
</div>

<!-- Video -->
<div id="videoBox" class="hidden videoBox">
  
  <button class="backBtn" onclick="closeVideo()">⬅ Back</button>

  <video controls autoplay>
    <source src="muskan.mp4" type="video/mp4">
  </video>

</div>

<script src="script.js"></script>

</body>
</html>

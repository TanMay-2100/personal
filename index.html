<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday My Love ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            max-width: 500px;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            color: #ff4d6d;
            font-size: 32px;
        }

        p {
            font-size: 18px;
            color: #333;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff1e4d;
        }

        .hidden-message {
            display: none;
            margin-top: 20px;
            font-weight: bold;
            color: #ff4d6d;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hearts {
            position: absolute;
            color: #ff4d6d;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎉 Happy Birthday My Love 🎂</h1>
    <p>
        To the most beautiful girl in my life ❤️<br><br>
        You make my world brighter every single day.<br>
        I’m so lucky to have you.<br><br>
        May your smile never fade and your dreams always come true ✨
    </p>

    <button onclick="showMessage()">Click for Surprise 💖</button>

    <div class="hidden-message" id="secret">
        I Love You More Than Words Can Say 💕 <br>
        Forever Yours ❤️
    </div>
</div>

<script>
    function showMessage() {
        document.getElementById("secret").style.display = "block";
    }

    // Floating hearts effect
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("hearts");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 15 + "px";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5000);
    }, 300);
</script>

</body>
</html>
